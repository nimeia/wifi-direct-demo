name: windows-demo

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build_installer:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Ensure UWP build components
        shell: pwsh
        timeout-minutes: 35
        run: |
          $installerRoot = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer"
          $vswhere = Join-Path $installerRoot "vswhere.exe"
          $setupExe = Join-Path $installerRoot "setup.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }
          if (-not (Test-Path $setupExe)) {
            throw "setup.exe not found at $setupExe"
          }

          $installPath = & $vswhere -latest -products * -property installationPath
          if (-not $installPath) {
            throw "Unable to detect Visual Studio installation path."
          }
          Write-Host "Visual Studio installation: $installPath"

          & $setupExe modify `
            --installPath "$installPath" `
            --add Microsoft.VisualStudio.Workload.Universal `
            --add Microsoft.VisualStudio.ComponentGroup.UWP.NetCoreAndStandard `
            --add Microsoft.VisualStudio.ComponentGroup.UWP.Support `
            --add Microsoft.VisualStudio.Component.Windows10SDK.19041 `
            --includeRecommended `
            --quiet `
            --norestart `
            --force

          if ($LASTEXITCODE -ne 0) {
            throw "Visual Studio modify failed with exit code $LASTEXITCODE"
          }

          $uapRoot = Join-Path ${env:ProgramFiles(x86)} "Reference Assemblies\Microsoft\Framework\UAP"
          $sdkRefsRoot = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\References"
          $minimumUapBuild = 19041
          $detectedUap = $false
          $detectedSdk = $false

          for ($attempt = 1; $attempt -le 18; $attempt++) {
            if (Test-Path $uapRoot) {
              $uapVersions = @(Get-ChildItem $uapRoot -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -match '^v10\.0\.\d+(\.\d+)?$' } |
                Select-Object -ExpandProperty Name)
              if ($uapVersions.Count -gt 0) {
                Write-Host "Detected UAP reference assemblies:"
                $uapVersions
                $compatible = $uapVersions | Where-Object {
                  $parts = $_.TrimStart('v').Split('.')
                  $parts.Count -ge 3 -and [int]$parts[2] -ge $minimumUapBuild
                }
                if ($compatible.Count -gt 0) {
                  $detectedUap = $true
                  break
                }
                Write-Host "No compatible UAP found (need build >= $minimumUapBuild); waiting..."
              }
            }

            if (Test-Path $sdkRefsRoot) {
              $sdkVersions = @(Get-ChildItem $sdkRefsRoot -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
                Sort-Object { [version]$_.Name } -Descending)
              $compatibleSdk = $sdkVersions | Where-Object { [version]$_.Name -ge [version]"10.0.19041.0" }
              if ($compatibleSdk.Count -gt 0) {
                Write-Host "Detected compatible Windows SDK references (fallback for shim):"
                $compatibleSdk | Select-Object -ExpandProperty Name
                $detectedSdk = $true
                break
              }
            }

            if ($attempt -lt 18) {
              Start-Sleep -Seconds 10
            }
          }

          if (-not $detectedUap -and -not $detectedSdk) {
            throw "Compatible UAP reference assemblies (build >= $minimumUapBuild) not found after install. Checked: $uapRoot and $sdkRefsRoot"
          }

      - name: Build Windows installer package
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-windows.ps1 `
            -Configuration Release `
            -Platform x64 `
            -OutputDir dist/windows-demo-build `
            -ZipPath dist/windows-demo-installer.zip

      - name: Verify installer package
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/windows-demo-installer.zip")) {
            throw "Installer zip not found: dist/windows-demo-installer.zip"
          }

          $appx = Get-ChildItem "dist/windows-demo-build/appx" -Recurse -File -Filter *.appx -ErrorAction SilentlyContinue
          if (-not $appx -or $appx.Count -eq 0) {
            throw "No .appx package found under dist/windows-demo-build/appx"
          }

      - name: Upload installer zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-demo-installer
          path: dist/windows-demo-installer.zip

      - name: Upload installer payload
        uses: actions/upload-artifact@v4
        with:
          name: windows-demo-installer-payload
          path: dist/windows-demo-build/**

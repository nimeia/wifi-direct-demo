name: release-windows-installer

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows_installer:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build installer package
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-windows.ps1 `
            -Configuration Release `
            -Platform x64 `
            -OutputDir dist/windows-demo-build `
            -ZipPath dist/windows-demo-installer.zip

      - name: Verify installer package
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/windows-demo-installer.zip")) {
            throw "Installer zip not found: dist/windows-demo-installer.zip"
          }

          $appx = Get-ChildItem "dist/windows-demo-build/appx" -Recurse -File -Filter *.appx -ErrorAction SilentlyContinue
          if (-not $appx -or $appx.Count -eq 0) {
            throw "No .appx package found under dist/windows-demo-build/appx"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-demo-installer
          path: dist/windows-demo-installer.zip

  release:
    runs-on: ubuntu-latest
    needs: [build_windows_installer]

    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-demo-installer
          path: dist

      - name: Generate release tag
        id: release_tag
        run: echo "tag=v$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Create checksum
        run: |
          cd dist
          sha256sum windows-demo-installer.zip > windows-demo-installer.zip.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_tag.outputs.tag }}
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/windows-demo-installer.zip
            dist/windows-demo-installer.zip.sha256
